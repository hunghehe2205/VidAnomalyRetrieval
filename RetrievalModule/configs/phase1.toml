phase = "phase1"
seed = 42

[model]
model_name_or_path = "Qwen/Qwen3-VL-Embedding-2B"
attn_implementation = "flash_attention_2"

[data]
train_file = "data/T2V_VAR/ucf_crime_train_dedup.json"
eval_file = "data/T2V_VAR/ucf_crime_test.json"
query_column = "English Text"
video_column = "Video Name"
server_prefix = "/workspace/VidAnomalyRetrieval/UCF-Crime"
fps = 1
max_frames = 32

[training]
output_dir = "outputs/phase1-warmup-v2"
per_device_train_batch_size = 8
per_device_eval_batch_size = 8
num_train_epochs = 2
learning_rate = 2.0e-5
weight_decay = 0.01
warmup_ratio = 0.1
temperature = 0.07
max_grad_norm = 1.0
lr_scheduler_type = "cosine"
logging_steps = 10
save_steps = 50
eval_steps = 50
max_eval_batches = 50
retrieval_eval_steps = 50
gradient_checkpointing = true
dataloader_num_workers = 4
bf16 = true
wandb_project = "Finetune-VAR-Qwen3VLembedding"
wandb_run_name = "phase1-v2-lr2e5-temp07"

[lora]
r = 32
lora_alpha = 32
lora_dropout = 0.05
bias = "none"
task_type = "FEATURE_EXTRACTION"
target_modules = ["q_proj", "k_proj", "v_proj", "gate_proj", "up_proj", "down_proj"]

[hub]
push_to_hub = false
model_id = "hungnghehe/qwen3-vl-embedding-phase1"
private = true
