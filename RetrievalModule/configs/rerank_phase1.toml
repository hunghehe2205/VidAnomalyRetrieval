phase = "rerank-phase1"
seed = 42

[model]
model_name_or_path = "/workspace/VidAnomalyRetrieval/RetrievalModule/models/Qwen3-VL-Reranker-2B"
attn_implementation = "flash_attention_2"

[data]
train_file       = "data/T2V_VAR/ucf_crime_train_dedup.json"
topk_train_file  = "outputs/topk_baseline_train.json"
descriptions_file = "/workspace/VidAnomalyRetrieval/DescriptionModule/GeneratedDescription/descriptions_train.json"
eval_topk_file   = "outputs/topk_baseline.json"
eval_descriptions_file = "/workspace/VidAnomalyRetrieval/DescriptionModule/GeneratedDescription/descriptions_test.json"
video_root       = "/workspace/VidAnomalyRetrieval/UCF_Video"
instruction      = "Retrieve a surveillance video whose visual content matches the anomaly event described in the query."

[training]
output_dir              = "outputs/rerank-phase1-v3"
num_hard                = 10          # was 5; group 16 closes train/eval horizon gap (eval ranks top-30)
num_medium              = 5           # was 2
hard_rank_lo            = 2
hard_rank_hi            = 20          # was 15; wider hard pool for diversity
medium_rank_lo          = 21
medium_rank_hi          = 50
max_frames              = 32
fps                     = 1.0
max_length              = 10240
num_epochs              = 2
learning_rate           = 5.0e-5
weight_decay            = 0.05
warmup_ratio            = 0.1
lr_scheduler            = "cosine"
gradient_accumulation   = 4
gradient_checkpointing  = true
max_grad_norm           = 1.0
logit_temperature       = 4.0         # was 2.0; softer + label_smoothing combats bimodal collapse seen in v2
label_smoothing         = 0.1         # NEW: floors CE loss ~0.4, prevents overconfidence collapse seen in v2 (loss→0.0000)
hard_neg_refresh_steps  = 0
hard_neg_refresh_topk   = 30
micro_batch_size        = 2
caption_dropout_p       = 0.5
logging_steps           = 10
progress_every_queries  = 5
save_steps              = 50
eval_steps              = 0
eval_on_test_subset     = 0
bf16                    = true

[wandb]
enable     = true
project    = "Finetune-VAR-Qwen3VL-Reranker"
run_name   = "rerank-phase1-v3-ls0.1-tau4-grp16"
log_every  = 10

[hub]
push_to_hub = false
model_id    = "hungnghehe/qwen3-vl-reranker-2b-ucf-rerank-phase1"
private     = true

[lora]
r              = 32
lora_alpha     = 32
lora_dropout   = 0.1                  # was 0.05; doubled to fight overfit (prev ckpt loss→0 by step 200)
bias           = "none"
target_modules = ["q_proj", "k_proj", "v_proj", "gate_proj", "up_proj", "down_proj"]
