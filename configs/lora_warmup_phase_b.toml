[model]
model_name_or_path = "Qwen/Qwen3-VL-Embedding-2B"
trust_remote_code = true
attn_implementation = "flash_attention_2"

[data]
train_file = "data/T2V_VAR/ucf_crime_train.json"
eval_file = "data/T2V_VAR/ucf_crime_test.json"
query_column = "English Text"
video_column = "Video Name"
server_prefix = "/workspace/VidAnomalyRetrieval/UCF-Crime"

# Optional: list the columns containing normal negative video paths.
# If omitted, script will try common defaults: normal_negatives, normal_negative_videos,
# normal_videos, negative_videos, negatives.
normal_negative_columns = ["normal_negatives"]
normal_negative_delimiter = "|||"

fps = 1
max_frames = 32

# Optional dataset truncation for debug runs.
# max_train_samples = 1024
# max_eval_samples = 256

[training]
output_dir = "outputs/qwen3-vl-embedding-phase-b-warmup"
per_device_train_batch_size = 4
per_device_eval_batch_size = 4
gradient_accumulation_steps = 8

num_train_epochs = 1
max_train_steps = 0

learning_rate = 2.0e-5
weight_decay = 0.01
max_grad_norm = 1.0

temperature = 0.07
num_normal_negatives = 0

warmup_ratio = 0.05
lr_scheduler_type = "cosine"

logging_steps = 10
save_steps = 200
eval_steps = 200
max_eval_batches = 50

bf16 = true
fp16 = false
tf32 = true
gradient_checkpointing = true
dataloader_num_workers = 4

report_to = "wandb"
wandb_project = "Finetune-VAR-Qwen3VLembedding"
wandb_run_name = ""

[lora]
enabled = true
r = 32
lora_alpha = 32
lora_dropout = 0.05
bias = "none"
task_type = "FEATURE_EXTRACTION"
target_modules = [
  "q_proj",
  "k_proj",
  "v_proj",
  "gate_proj",
  "up_proj",
  "down_proj",
]

[hub]
push_to_hub = false
model_id = "hungnghehe/qwen3-vl-embedding-phase-b"
private = true

[run]
seed = 42
